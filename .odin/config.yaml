base_agent: claude
agents:
  claude:
    cli_command: claude
    run_in_forkd: true
    forkd_bin: ${FORKD_BIN}
    forkd_kernel: ${FORKD_KERNEL}
    forkd_scripts_dir: ${FORKD_SCRIPTS_DIR}
    forkd_mode: controller
    forkd_controller_url: http://127.0.0.1:8889
    forkd_snapshot_tag: odin-node22-4g-cli-browser
    forkd_mem_size_mib: 4096
    forkd_per_child_netns: true
  codex:
    cli_command: codex
    run_in_forkd: true
    forkd_bin: ${FORKD_BIN}
    forkd_kernel: ${FORKD_KERNEL}
    forkd_scripts_dir: ${FORKD_SCRIPTS_DIR}
    forkd_mode: controller
    forkd_controller_url: http://127.0.0.1:8889
    forkd_snapshot_tag: odin-node22-4g-cli-browser
    forkd_mem_size_mib: 4096
    forkd_per_child_netns: true
  gemini:
    cli_command: gemini
    run_in_forkd: true
    forkd_bin: ${FORKD_BIN}
    forkd_kernel: ${FORKD_KERNEL}
    forkd_scripts_dir: ${FORKD_SCRIPTS_DIR}
    forkd_mode: controller
    forkd_controller_url: http://127.0.0.1:8889
    forkd_snapshot_tag: odin-node22-4g-cli-browser
    forkd_mem_size_mib: 4096
    forkd_per_child_netns: true
  qwen:
    cli_command: qwen
  minimax:
    cli_command: opencode
    api_key: ${MINIMAX_API_KEY}
    run_in_forkd: true
    forkd_bin: ${FORKD_BIN}
    forkd_kernel: ${FORKD_KERNEL}
    forkd_scripts_dir: ${FORKD_SCRIPTS_DIR}
    forkd_mode: controller
    forkd_controller_url: http://127.0.0.1:8889
    forkd_snapshot_tag: odin-node22-4g-cli-browser
    forkd_mem_size_mib: 4096
    forkd_per_child_netns: true
  glm:
    cli_command: opencode
    api_key: ${ZAI_API_KEY}
    run_in_forkd: true
    forkd_bin: ${FORKD_BIN}
    forkd_kernel: ${FORKD_KERNEL}
    forkd_scripts_dir: ${FORKD_SCRIPTS_DIR}
    forkd_mode: controller
    forkd_controller_url: http://127.0.0.1:8889
    forkd_snapshot_tag: odin-node22-4g-cli-browser
    forkd_mem_size_mib: 4096
    forkd_per_child_netns: true
task_storage: .odin/tasks
log_dir: .odin/logs
execution_timeout_seconds: 1800
board_backend: taskit
mcps:
- taskit
- mobile
- chrome-devtools
taskit:
  base_url: http://localhost:9100
  board_id: 14
chrome_devtools:
  headless: true
board_id: 14
base_url: http://localhost:9100
